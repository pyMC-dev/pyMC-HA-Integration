name: Hassfest

on:
  push:
    paths:
      - "custom_components/**"
      - "hacs.json"
      - ".github/workflows/hassfest.yaml"
  pull_request:
    paths:
      - "custom_components/**"
      - "hacs.json"
      - ".github/workflows/hassfest.yaml"
  release:
    types:
      - published
  workflow_dispatch:

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate with hassfest
        uses: home-assistant/actions/hassfest@master
