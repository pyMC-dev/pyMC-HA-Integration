changelog:
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: CI and Maintenance
      labels:
        - ci
        - dependencies
        - github-actions
  exclude:
    labels:
      - skip-changelog
