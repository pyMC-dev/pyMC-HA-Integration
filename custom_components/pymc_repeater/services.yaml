  description: Return recent packets stored by the repeater.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: pymc_repeater
    limit:
      default: 100
      selector:
        number:
          min: 1
          max: 10000
          mode: box

get_filtered_packets:
  name: Get filtered packets
  description: Return stored packets filtered by type, route, or time range.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: pymc_repeater
    packet_type:
      selector:
        number:
          min: 0
          max: 255
          mode: box
    route:
      selector:
        number:
          min: 0
          max: 255
          mode: box
    start_timestamp:
      selector:
        number:
          mode: box
    end_timestamp:
      selector:
        number:
          mode: box
    limit:
      default: 1000
      selector:
        number:
          min: 1
          max: 10000
          mode: box

get_packet_by_hash:
