ping_neighbor:
  name: Ping neighbor
  description: Send a ping to a neighbor by hash/path ID.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: pymc_repeater
    target_id:
      required: true
      selector:
        text:
    timeout:
      default: 10
      selector:
        number:
          min: 1
          max: 60
          mode: box

room_post_message:
  name: Post room message
  description: Post a message to a pyMC room server.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: pymc_repeater
    room_name:
      selector:
        text:
    room_hash:
      selector:
        text:
    message:
      required: true
      selector:
        text:
          multiline: true
    author_pubkey:
      default: server
      selector:
        text:
    txt_type:
      default: 0
      selector:
        number:
          min: 0
          max: 255
          mode: box

room_messages_clear:
  name: Clear room messages
  description: Delete all messages from a room server.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: pymc_repeater
    room_name:
      selector:
        text:
    room_hash:
      selector:
        text:

cad_calibration_start:
  name: Start CAD calibration
  description: Start CAD calibration on the repeater.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: pymc_repeater
    samples:
      default: 8
      selector:
        number:
          min: 1
          max: 64
          mode: box
    delay:
      default: 100
      selector:
        number:
          min: 0
          max: 5000
          mode: box

cad_calibration_stop:
  name: Stop CAD calibration
  description: Stop an active CAD calibration run.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: pymc_repeater

save_cad_settings:
  name: Save CAD settings
  description: Save CAD calibration settings to the repeater.
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: pymc_repeater
    peak:
      required: true
      selector:
        number:
          min: 0
          max: 255
          mode: box
    min_val:
      required: true
      selector:
        number:
          min: 0
          max: 255
          mode: box
    detection_rate:
      default: 0
      selector:
        number:
          min: 0
          max: 255
          mode: box

db_purge:
  name: Purge database tables
