# pyMC Repeater dashboard template
#
# Replace every instance of REPEATER_SLUG with your real entity prefix.
# Example:
#   sensor.repeater_name_here_radio_utilization
#   binary_sensor.repeater_name_here_mqtt_handler_active
#
# Home Assistant entity IDs are based on the entity's display name and can also
# be preserved by the entity registry across updates. If one row does not match
# your install exactly, swap it for the real entity from HA's entity picker.
#
# Dynamic broker and companion entities vary by installation. In the Network
# view below, swap the example placeholders for the broker/companion entity IDs
# that exist in your Home Assistant instance.

title: pyMC Repeater
views:
  - title: Overview
    path: overview
    icon: mdi:radio-tower
    badges: []
    cards:
      - type: markdown
        content: |
          # pyMC Repeater
          Clean operational view for radio health, MQTT state, packet flow, and system load.

      - type: grid
        columns: 4
        square: false
        cards:
          - type: tile
            entity: sensor.REPEATER_SLUG_repeater_version
            name: Version
            vertical: true
          - type: tile
            entity: sensor.REPEATER_SLUG_system_uptime
            name: Uptime
            vertical: true
          - type: tile
            entity: sensor.REPEATER_SLUG_connected_mqtt_brokers
            name: MQTT Up
            vertical: true
          - type: tile
            entity: sensor.REPEATER_SLUG_configured_companions
            name: Companions
            vertical: true

      - type: grid
        columns: 4
        square: false
        cards:
          - type: gauge
            entity: sensor.REPEATER_SLUG_radio_utilization
            name: Radio Utilization
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 40
              red: 75
          - type: gauge
            entity: sensor.REPEATER_SLUG_packet_drop_rate_24h
            name: Packet Drop
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 10
              red: 25
          - type: gauge
            entity: sensor.REPEATER_SLUG_cpu_usage
            name: CPU
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.REPEATER_SLUG_disk_usage
            name: Disk
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90

      - type: history-graph
        title: Packet Activity
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - entity: sensor.REPEATER_SLUG_packets_24h
            name: Total
          - entity: sensor.REPEATER_SLUG_transmitted_packets_24h
            name: TX
          - entity: sensor.REPEATER_SLUG_dropped_packets_24h
            name: Dropped

      - type: history-graph
        title: RF Noise Trend
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - entity: sensor.REPEATER_SLUG_current_noise_floor
            name: Current
          - entity: sensor.REPEATER_SLUG_avg_noise_floor_24h
            name: Average

      - type: grid
        columns: 3
        square: false
        cards:
          - type: tile
            entity: sensor.REPEATER_SLUG_packets_received_per_hour
            name: RX / Hour
          - type: tile
            entity: sensor.REPEATER_SLUG_packets_forwarded_per_hour
            name: Forwarded / Hour
          - type: tile
            entity: sensor.REPEATER_SLUG_current_airtime
            name: Current Airtime
          - type: tile
            entity: sensor.REPEATER_SLUG_average_rssi_24h
            name: Avg RSSI
          - type: tile
            entity: sensor.REPEATER_SLUG_average_snr_24h
            name: Avg SNR
          - type: tile
            entity: sensor.REPEATER_SLUG_crc_errors_24h
            name: CRC Errors

      - type: entities
        title: System and Storage
        show_header_toggle: false
        entities:
          - entity: sensor.REPEATER_SLUG_memory_usage
            name: Memory usage
          - entity: sensor.REPEATER_SLUG_memory_used
            name: Memory used
          - entity: sensor.REPEATER_SLUG_database_size
            name: Database size
          - entity: sensor.REPEATER_SLUG_metrics_history_size
            name: Metrics history size
          - entity: sensor.REPEATER_SLUG_network_bytes_sent
            name: Network sent
          - entity: sensor.REPEATER_SLUG_network_bytes_received
            name: Network received
          - entity: sensor.REPEATER_SLUG_total_processes
            name: Processes

  - title: Network
    path: network
    icon: mdi:lan
    badges: []
    cards:
      - type: entities
        title: MQTT Summary
        show_header_toggle: false
        entities:
          - entity: binary_sensor.REPEATER_SLUG_mqtt_handler_active
            name: MQTT handler
          - entity: binary_sensor.REPEATER_SLUG_mqtt_broker_connected
            name: Any broker connected
          - entity: sensor.REPEATER_SLUG_mqtt_connected_brokers
            name: Connected brokers

      - type: entities
        title: Broker Connections
        show_header_toggle: false
        entities:
          # Replace these example rows with the broker entities created in your HA instance.
          - entity: binary_sensor.REPEATER_SLUG_mqtt_localhost
            name: Localhost
          - entity: binary_sensor.REPEATER_SLUG_mqtt_us_west_letsmesh_v1
            name: US West
          - entity: binary_sensor.REPEATER_SLUG_mqtt_meshmapper
            name: MeshMapper

      - type: entities
        title: ACL and Identity
        show_header_toggle: false
        entities:
          - entity: sensor.REPEATER_SLUG_acl_clients
            name: ACL clients
          - entity: sensor.REPEATER_SLUG_authenticated_clients
            name: Authenticated clients
          - entity: sensor.REPEATER_SLUG_registered_identities
            name: Registered identities
          - entity: sensor.REPEATER_SLUG_configured_companions
            name: Configured companions

      - type: entities
        title: Companion Presence
        show_header_toggle: false
        entities:
          # Replace these example rows with the companion entities created in your HA instance.
          - entity: binary_sensor.REPEATER_SLUG_companion_phone
            name: Phone
          - entity: binary_sensor.REPEATER_SLUG_companion_tablet
            name: Tablet

      - type: entities
        title: Routing and Advert Rate Control
        show_header_toggle: false
        entities:
          - entity: sensor.REPEATER_SLUG_advert_tier
            name: Advert tier
          - entity: sensor.REPEATER_SLUG_adverts_allowed
            name: Adverts allowed
          - entity: sensor.REPEATER_SLUG_adverts_dropped
            name: Adverts dropped
          - entity: sensor.REPEATER_SLUG_advert_drop_rate
            name: Advert drop rate
          - entity: binary_sensor.REPEATER_SLUG_advert_adaptive_enabled
            name: Adaptive enabled
          - entity: binary_sensor.REPEATER_SLUG_advert_dedupe_enabled
            name: Dedupe enabled

  - title: Control
    path: control
    icon: mdi:tune
    badges: []
    cards:
      - type: grid
        columns: 3
        square: false
        cards:
          - type: tile
            entity: select.REPEATER_SLUG_repeater_mode
            name: Mode
            features_position: bottom
          - type: tile
            entity: switch.REPEATER_SLUG_duty_cycle_enforcement
            name: Duty Cycle
          - type: tile
            entity: number.REPEATER_SLUG_max_airtime_percent
            name: Max Airtime
            features_position: bottom
          - type: tile
            entity: switch.REPEATER_SLUG_advert_rate_limit
            name: Rate Limit
          - type: tile
            entity: switch.REPEATER_SLUG_advert_penalty_box
            name: Penalty Box
          - type: tile
            entity: switch.REPEATER_SLUG_advert_adaptive_control
            name: Adaptive

      - type: horizontal-stack
        cards:
          - type: button
            entity: button.REPEATER_SLUG_send_advert
            name: Send Advert
            icon: mdi:radio-tower
            tap_action:
              action: toggle
          - type: button
            entity: button.REPEATER_SLUG_restart_repeater_service
            name: Restart
            icon: mdi:restart
            tap_action:
              action: toggle
          - type: button
            entity: button.REPEATER_SLUG_vacuum_metrics_database
            name: Vacuum DB
            icon: mdi:database-refresh-outline
            tap_action:
              action: toggle

      - type: entities
        title: Advert Rate Limit Tuning
        show_header_toggle: false
        entities:
          - entity: number.REPEATER_SLUG_advert_bucket_capacity
            name: Bucket capacity
          - entity: number.REPEATER_SLUG_advert_refill_tokens
            name: Refill tokens
          - entity: number.REPEATER_SLUG_advert_refill_interval
            name: Refill interval
          - entity: number.REPEATER_SLUG_advert_minimum_interval
            name: Minimum interval
          - entity: number.REPEATER_SLUG_advert_violation_threshold
            name: Violation threshold
          - entity: number.REPEATER_SLUG_advert_violation_decay
            name: Violation decay
          - entity: number.REPEATER_SLUG_advert_base_penalty
            name: Base penalty
          - entity: number.REPEATER_SLUG_advert_penalty_multiplier
            name: Penalty multiplier
          - entity: number.REPEATER_SLUG_advert_max_penalty
            name: Max penalty
          - entity: number.REPEATER_SLUG_advert_ewma_alpha
            name: EWMA alpha
          - entity: number.REPEATER_SLUG_advert_hysteresis
            name: Hysteresis
          - entity: number.REPEATER_SLUG_advert_quiet_max
            name: Quiet max
          - entity: number.REPEATER_SLUG_advert_normal_max
            name: Normal max
          - entity: number.REPEATER_SLUG_advert_busy_max
            name: Busy max
